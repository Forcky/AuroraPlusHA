title: Aurora Energy
views:
  - title: Overview
    path: aurora
    icon: mdi:lightning-bolt
    cards:

      # ── Current Tariff Period ────────────────────────────────────────
      - type: custom:mushroom-template-card
        primary: >
          {% if is_state('sensor.aurora_energy_t93_tariff_period', 'peak') %}
            ⚡ Peak Rate
          {% else %}
            💤 Off-Peak Rate
          {% endif %}
        secondary: >
          {% if is_state('sensor.aurora_energy_t93_tariff_period', 'peak') %}
            Higher rates apply — consider deferring heavy loads
          {% else %}
            Lower rates apply — good time to run dishwasher, washing machine, etc.
          {% endif %}
        icon: >
          {% if is_state('sensor.aurora_energy_t93_tariff_period', 'peak') %}
            mdi:lightning-bolt
          {% else %}
            mdi:lightning-bolt-off
          {% endif %}
        icon_color: >
          {% if is_state('sensor.aurora_energy_t93_tariff_period', 'peak') %}
            red
          {% else %}
            green
          {% endif %}
        card_mod:
          style: |
            ha-card {
              background: {% if is_state('sensor.aurora_energy_t93_tariff_period', 'peak') %}
                rgba(255,50,50,0.12)
              {% else %}
                rgba(50,200,50,0.12)
              {% endif %};
            }

      # ── Power Hours Status ───────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aurora_energy_power_hour_status
            state: active
        card:
          type: custom:mushroom-template-card
          primary: "🎉 Power Hour — Electricity is FREE right now!"
          secondary: >
            {% set end = states('sensor.aurora_energy_power_hour_end') %}
            Free power until {{ end | as_timestamp | timestamp_custom('%I:%M %p') if end not in ['unknown', 'unavailable'] else 'soon' }}
          icon: mdi:star-shooting
          icon_color: yellow
          card_mod:
            style: |
              ha-card { background: rgba(255,215,0,0.18); }

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aurora_energy_power_hour_status
            state: confirmed
        card:
          type: custom:mushroom-template-card
          primary: "⚡ Free Power Coming Up!"
          secondary: >
            {% set start = states('sensor.aurora_energy_power_hour_start') %}
            {% set end = states('sensor.aurora_energy_power_hour_end') %}
            {{ states('sensor.aurora_energy_power_hour_event') }} —
            {% if start not in ['unknown', 'unavailable'] and end not in ['unknown', 'unavailable'] %}
              free from {{ start | as_timestamp | timestamp_custom('%I:%M %p') }} to {{ end | as_timestamp | timestamp_custom('%I:%M %p') }}
            {% else %}
              timeslot details loading
            {% endif %}
          icon: mdi:clock-star-four-points
          icon_color: orange

      - type: conditional
        conditions:
          - condition: state
            entity: sensor.aurora_energy_power_hour_status
            state: selection_pending
        card:
          type: entities
          title: "⏳ Power Hour — Select Your Timeslot!"
          icon: mdi:timer-sand
          entities:
            - entity: sensor.aurora_energy_power_hour_event
              name: Event
            - entity: sensor.aurora_energy_power_hour_selection_deadline
              name: Select by

      # ── Account Balance ──────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: tile
            entity: sensor.aurora_energy_estimated_balance
            name: Estimated Balance
          - type: tile
            entity: sensor.aurora_energy_amount_owed
            name: Amount Owed
          - type: tile
            entity: sensor.aurora_energy_unbilled_amount
            name: Unbilled Amount

      # ── Billing Summary ──────────────────────────────────────────────
      - type: entities
        title: Billing Summary
        icon: mdi:file-document-outline
        entities:
          - entity: sensor.aurora_energy_bill_total_amount
            name: Current Bill Total
          - entity: sensor.aurora_energy_bill_due_date
            name: Bill Due Date
          - entity: sensor.aurora_energy_overdue_amount
            name: Overdue Amount
          - entity: sensor.aurora_energy_unpaid_bills
            name: Unpaid Bills
          - entity: sensor.aurora_energy_average_daily_usage
            name: Avg Daily Spend
          - entity: sensor.aurora_energy_usage_days_remaining
            name: Days Remaining in Period

      # ── Billing Period Totals ────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: tile
            entity: sensor.aurora_energy_billing_period_usage
            name: This Period (kWh)
          - type: tile
            entity: sensor.aurora_energy_billing_period_cost
            name: This Period (Cost)

      - type: horizontal-stack
        cards:
          - type: tile
            entity: sensor.aurora_energy_billing_period_solar_feed_in
            name: Solar This Period
          - type: tile
            entity: sensor.aurora_energy_billing_period_solar_earnings
            name: Solar Earnings

      # ── Yesterday's Usage ────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: tile
            entity: sensor.aurora_energy_daily_total_usage
            name: Yesterday's Usage
          - type: tile
            entity: sensor.aurora_energy_daily_total_cost
            name: Yesterday's Cost
          - type: tile
            entity: sensor.aurora_energy_solar_feed_in
            name: Solar Feed-in

      # ── Hourly Breakdown (Yesterday) ────────────────────────────────
      - type: statistics-graph
        title: Hourly Usage — Yesterday
        days_to_show: 2
        period: hour
        chart_type: bar
        stat_types:
          - change
        entities:
          - entity: aurora_energy:total_kwh
            name: Consumption (kWh)
          - entity: aurora_energy:solar_feedin_kwh
            name: Solar Feed-in (kWh)

      - type: statistics-graph
        title: Hourly Peak vs Off-Peak — Yesterday
        days_to_show: 2
        period: hour
        chart_type: bar
        stat_types:
          - change
        entities:
          - entity: aurora_energy:t93peak_kwh
            name: Peak (kWh)
          - entity: aurora_energy:t93offpeak_kwh
            name: Off-Peak (kWh)

      # ── Power Hours Summary ──────────────────────────────────────────
      - type: entities
        title: Power Hours
        icon: mdi:clock-star-four-points
        entities:
          - entity: sensor.aurora_energy_power_hour_status
            name: Status
          - entity: sensor.aurora_energy_power_hour_event
            name: Event
          - entity: sensor.aurora_energy_power_hour_start
            name: Starts
          - entity: sensor.aurora_energy_power_hour_end
            name: Ends
          - entity: sensor.aurora_energy_power_hour_selection_deadline
            name: Select by
          - entity: sensor.aurora_energy_power_hour_total_savings
            name: Total Savings

      # ── Usage History (7 days) ───────────────────────────────────────
      - type: statistics-graph
        title: Energy Usage — Last 7 Days
        days_to_show: 7
        period: day
        chart_type: bar
        stat_types:
          - change
        entities:
          - entity: aurora_energy:total_kwh
            name: Consumption (kWh)
          - entity: aurora_energy:solar_feedin_kwh
            name: Solar Feed-in (kWh)

      # ── Peak vs Off-Peak History (7 days) ───────────────────────────
      - type: statistics-graph
        title: Peak vs Off-Peak Usage — Last 7 Days
        days_to_show: 7
        period: day
        chart_type: bar
        stat_types:
          - change
        entities:
          - entity: aurora_energy:t93peak_kwh
            name: Peak (kWh)
          - entity: aurora_energy:t93offpeak_kwh
            name: Off-Peak (kWh)

      # ── Cost History (7 days) ────────────────────────────────────────
      - type: statistics-graph
        title: Energy Cost — Last 7 Days
        days_to_show: 7
        period: day
        chart_type: bar
        stat_types:
          - change
        entities:
          - entity: aurora_energy:total_dollars
            name: Energy Cost (AUD)
          - entity: aurora_energy:solar_feedin_dollars
            name: Feed-in Earnings (AUD)
